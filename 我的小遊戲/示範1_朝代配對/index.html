<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>朝代配對練習</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #170c0b;
      --panel: #241312;
      --ink: #fff4df;
      --muted: #d6bf90;
      --gold: #d9aa45;
      --gold-2: #ffe089;
      --red: #9f2420;
      --red-2: #d84835;
      --cream: #f6e1b6;
      --dark-card: #20100f;
      --green: #2f8f5b;
      --line: rgba(217, 170, 69, 0.42);
      --shadow: 0 26px 70px rgba(0, 0, 0, 0.38);
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 0%, rgba(216, 72, 53, 0.22), transparent 30rem),
        radial-gradient(circle at 86% 8%, rgba(217, 170, 69, 0.18), transparent 34rem),
        linear-gradient(180deg, #23100e, var(--bg));
      font-family: "Noto Serif TC", "Microsoft JhengHei", serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background-image:
        linear-gradient(45deg, rgba(255, 224, 137, 0.18) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255, 224, 137, 0.18) 25%, transparent 25%);
      background-size: 34px 34px;
    }

    .wrap {
      position: relative;
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      color: var(--gold-2);
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.05;
      letter-spacing: 0;
      text-shadow: 0 0 18px rgba(217, 170, 69, 0.38);
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .score {
      min-width: 158px;
      padding: 12px 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(36, 19, 18, 0.9);
      box-shadow: inset 0 0 0 1px rgba(255, 224, 137, 0.08);
      text-align: center;
    }

    .score span {
      display: block;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .score strong {
      color: var(--gold-2);
      font-size: 2rem;
      line-height: 1.1;
    }

    .game {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(330px, 0.85fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(36, 19, 18, 0.9);
      box-shadow: var(--shadow), inset 0 0 0 1px rgba(255, 224, 137, 0.08);
      overflow: hidden;
    }

    .panel-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 16px;
      color: var(--gold-2);
      border-bottom: 1px solid var(--line);
      background: linear-gradient(90deg, rgba(159, 36, 32, 0.28), rgba(217, 170, 69, 0.1));
      font-weight: 900;
    }

    .dynasty-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      padding: 16px;
    }

    .dynasty-card {
      min-height: 220px;
      display: grid;
      grid-template-rows: auto 1fr;
      border: 2px solid var(--gold);
      border-radius: 8px;
      color: #2c1409;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.48), transparent 45%),
        var(--cream);
      box-shadow: inset 0 0 0 2px rgba(119, 55, 18, 0.08);
      overflow: hidden;
    }

    .dynasty-name {
      padding: 12px;
      border-bottom: 1px solid rgba(116, 66, 19, 0.25);
      color: #4b1c12;
      background: rgba(217, 170, 69, 0.28);
      font-size: 2.1rem;
      font-weight: 900;
      text-align: center;
    }

    .drop-zone {
      min-height: 140px;
      display: flex;
      align-content: start;
      align-items: start;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px;
      transition: background 0.2s ease, box-shadow 0.2s ease;
    }

    .drop-zone::before {
      content: "拖曳事件到此";
      width: 100%;
      color: rgba(75, 28, 18, 0.48);
      font-size: 0.9rem;
      text-align: center;
    }

    .drop-zone:has(.event-card)::before { display: none; }

    .drop-zone.drag-over {
      background: rgba(217, 170, 69, 0.22);
      box-shadow: inset 0 0 0 3px rgba(159, 36, 32, 0.16);
    }

    .event-bank {
      min-height: 556px;
      display: flex;
      align-content: start;
      align-items: start;
      flex-wrap: wrap;
      gap: 10px;
      padding: 16px;
    }

    .event-card {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      padding: 9px 12px;
      border: 1px solid var(--red-2);
      border-radius: 8px;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent),
        var(--dark-card);
      box-shadow: inset 0 0 0 1px rgba(255, 224, 137, 0.08);
      cursor: grab;
      font-size: 0.98rem;
      font-weight: 700;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
    }

    .event-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(0, 0, 0, 0.24);
    }

    .event-card.dragging {
      opacity: 0.55;
      cursor: grabbing;
    }

    .event-card .icon {
      font-size: 1.22rem;
      line-height: 1;
    }

    .event-card.correct {
      min-height: 34px;
      padding: 6px 9px;
      border-color: rgba(47, 143, 91, 0.9);
      color: #f1fff5;
      background: linear-gradient(180deg, #3aa568, #237247);
      box-shadow: 0 7px 14px rgba(35, 114, 71, 0.22);
      cursor: default;
      font-size: 0.82rem;
    }

    .event-card.correct .icon {
      font-size: 1rem;
    }

    .event-card.wrong {
      animation: wrongFlash 0.3s ease;
    }

    .event-card.snap-back {
      animation: snapBack 0.28s ease;
    }

    .progress {
      color: var(--muted);
      font-weight: 700;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(23, 12, 11, 0.72);
      z-index: 5;
    }

    .overlay.show {
      display: grid;
      animation: goldFlash 0.78s ease;
    }

    .win-box {
      width: min(460px, 100%);
      padding: 28px;
      border: 2px solid var(--gold-2);
      border-radius: 8px;
      color: #34170b;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.86), transparent 18rem),
        linear-gradient(180deg, #ffe0a0, #d9aa45);
      box-shadow: 0 0 40px rgba(255, 224, 137, 0.55), var(--shadow);
      text-align: center;
    }

    .win-box h2 {
      margin: 0 0 8px;
      font-size: 2.25rem;
    }

    .win-box p {
      margin: 0 0 18px;
      font-weight: 700;
    }

    .win-box button {
      min-height: 44px;
      padding: 10px 18px;
      border: 0;
      border-radius: 8px;
      color: var(--ink);
      background: linear-gradient(180deg, #b92e26, #7f1714);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
    }

    @keyframes wrongFlash {
      0%, 100% { background: var(--dark-card); transform: translateX(0); }
      35% { background: #b51e1a; transform: translateX(-6px); box-shadow: 0 0 18px rgba(216, 72, 53, 0.76); }
      70% { transform: translateX(6px); }
    }

    @keyframes snapBack {
      0% { transform: scale(0.96); }
      65% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    @keyframes goldFlash {
      0% { background: rgba(255, 224, 137, 0.92); }
      100% { background: rgba(23, 12, 11, 0.72); }
    }

    @media (max-width: 860px) {
      .wrap { width: min(100% - 24px, 680px); }
      header { display: block; }
      .score { margin-top: 14px; text-align: left; }
      .game { grid-template-columns: 1fr; }
      .dynasty-grid { grid-template-columns: 1fr; }
      .dynasty-card { min-height: 172px; }
      .event-bank {
        min-height: 112px;
        flex-wrap: nowrap;
        overflow-x: auto;
        overscroll-behavior-x: contain;
        scrollbar-color: var(--gold) rgba(36, 19, 18, 0.9);
      }
      .event-card {
        flex: 0 0 auto;
        max-width: 230px;
      }
    }

    .map-link {
      position: fixed;
      top: 14px;
      left: 14px;
      z-index: 10;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--gold-2);
      background: rgba(36, 19, 18, 0.92);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
      font-weight: 900;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <a class="map-link" href="../大冒險地圖/index.html">← 回到大地圖</a>
  <div class="wrap">
    <header>
      <div>
        <h1>朝代配對</h1>
        <p class="subtitle">把右側事件拖曳到正確朝代。每個朝代可以放多張事件卡。</p>
      </div>
      <div class="score" aria-label="嘗試次數">
        <span>嘗試次數</span>
        <strong id="attempts">0</strong>
      </div>
    </header>

    <main class="game">
      <section class="panel" aria-label="朝代配對區">
        <div class="panel-title">
          <span>朝代卡格</span>
          <span class="progress"><span id="matchedCount">0</span>/<span id="totalCount">16</span></span>
        </div>
        <div id="dynastyGrid" class="dynasty-grid"></div>
      </section>

      <section class="panel" aria-label="事件卡區">
        <div class="panel-title">
          <span>事件卡</span>
          <span>拖曳配對</span>
        </div>
        <div id="eventBank" class="event-bank"></div>
      </section>
    </main>
  </div>

  <div id="overlay" class="overlay" role="dialog" aria-modal="true" aria-labelledby="winTitle">
    <div class="win-box">
      <h2 id="winTitle">配對完成</h2>
      <p id="winText">你完成了所有事件配對。</p>
      <button id="restart" type="button">再玩一次</button>
    </div>
  </div>

  <script>
    const dynasties = [
      { id: 1, name: "秦" },
      { id: 2, name: "漢" },
      { id: 3, name: "唐" },
      { id: 4, name: "宋" },
      { id: 5, name: "明" },
      { id: 6, name: "清" }
    ];

    const events = [
      { id: "e1",  dynasty_id: 1, text: "統一六國", icon: "⚔️" },
      { id: "e2",  dynasty_id: 1, text: "修築萬里長城", icon: "🧱" },
      { id: "e3",  dynasty_id: 1, text: "焚書坑儒", icon: "🔥" },
      { id: "e4",  dynasty_id: 2, text: "張騫通西域", icon: "🐪" },
      { id: "e5",  dynasty_id: 2, text: "文景之治", icon: "📜" },
      { id: "e6",  dynasty_id: 2, text: "罷黜百家獨尊儒術", icon: "📖" },
      { id: "e7",  dynasty_id: 3, text: "貞觀之治", icon: "👑" },
      { id: "e8",  dynasty_id: 3, text: "安史之亂", icon: "💥" },
      { id: "e9",  dynasty_id: 3, text: "玄奘西行取經", icon: "🧘" },
      { id: "e10", dynasty_id: 4, text: "王安石變法", icon: "📜" },
      { id: "e11", dynasty_id: 4, text: "岳飛抗金", icon: "🗡️" },
      { id: "e12", dynasty_id: 5, text: "鄭和下西洋", icon: "⛵" },
      { id: "e13", dynasty_id: 5, text: "永樂大典編成", icon: "📚" },
      { id: "e14", dynasty_id: 6, text: "鴉片戰爭", icon: "💣" },
      { id: "e15", dynasty_id: 6, text: "康熙盛世", icon: "🌅" },
      { id: "e16", dynasty_id: 6, text: "辛亥革命終結", icon: "🏛️" }
    ];

    const dynastyGrid = document.querySelector("#dynastyGrid");
    const eventBank = document.querySelector("#eventBank");
    const attemptsEl = document.querySelector("#attempts");
    const matchedCountEl = document.querySelector("#matchedCount");
    const totalCountEl = document.querySelector("#totalCount");
    const overlay = document.querySelector("#overlay");
    const winText = document.querySelector("#winText");
    const restartBtn = document.querySelector("#restart");

    let attempts = 0;
    let matched = 0;
    let draggedId = null;

    function shuffle(items) {
      return [...items].sort(() => Math.random() - 0.5);
    }

    function startGame() {
      attempts = 0;
      matched = 0;
      draggedId = null;
      attemptsEl.textContent = attempts;
      matchedCountEl.textContent = matched;
      totalCountEl.textContent = events.length;
      overlay.classList.remove("show");
      dynastyGrid.innerHTML = "";
      eventBank.innerHTML = "";

      renderDynasties();
      renderEvents();
    }

    function renderDynasties() {
      dynasties.forEach(dynasty => {
        const card = document.createElement("article");
        card.className = "dynasty-card";

        const name = document.createElement("div");
        name.className = "dynasty-name";
        name.textContent = dynasty.name;

        const zone = document.createElement("div");
        zone.className = "drop-zone";
        zone.dataset.dynastyId = dynasty.id;
        zone.addEventListener("dragover", handleDragOver);
        zone.addEventListener("dragleave", handleDragLeave);
        zone.addEventListener("drop", handleDrop);

        card.append(name, zone);
        dynastyGrid.appendChild(card);
      });
    }

    function renderEvents() {
      shuffle(events).forEach(eventItem => {
        eventBank.appendChild(createEventCard(eventItem));
      });
    }

    function createEventCard(eventItem) {
      const card = document.createElement("div");
      card.className = "event-card";
      card.draggable = true;
      card.dataset.eventId = eventItem.id;
      card.dataset.dynastyId = eventItem.dynasty_id;
      card.innerHTML = `<span class="icon">${eventItem.icon}</span><span>${eventItem.text}</span>`;
      card.addEventListener("dragstart", handleDragStart);
      card.addEventListener("dragend", handleDragEnd);
      return card;
    }

    function handleDragStart(event) {
      const card = event.currentTarget;
      if (card.classList.contains("correct")) {
        event.preventDefault();
        return;
      }
      draggedId = card.dataset.eventId;
      card.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", draggedId);
    }

    function handleDragEnd(event) {
      event.currentTarget.classList.remove("dragging");
      document.querySelectorAll(".drop-zone").forEach(zone => zone.classList.remove("drag-over"));
    }

    function handleDragOver(event) {
      event.preventDefault();
      event.currentTarget.classList.add("drag-over");
      event.dataTransfer.dropEffect = "move";
    }

    function handleDragLeave(event) {
      event.currentTarget.classList.remove("drag-over");
    }

    function handleDrop(event) {
      event.preventDefault();
      const zone = event.currentTarget;
      zone.classList.remove("drag-over");

      const eventId = event.dataTransfer.getData("text/plain") || draggedId;
      const card = document.querySelector(`[data-event-id="${eventId}"]`);
      if (!card || card.classList.contains("correct")) return;

      attempts += 1;
      attemptsEl.textContent = attempts;

      const targetDynastyId = Number(zone.dataset.dynastyId);
      const cardDynastyId = Number(card.dataset.dynastyId);

      if (targetDynastyId === cardDynastyId) {
        lockCorrectCard(card, zone);
      } else {
        rejectCard(card);
      }
    }

    function lockCorrectCard(card, zone) {
      card.classList.remove("wrong", "snap-back");
      card.classList.add("correct");
      card.draggable = false;
      zone.appendChild(card);
      matched += 1;
      matchedCountEl.textContent = matched;

      if (matched === events.length) {
        showWin();
      }
    }

    function rejectCard(card) {
      card.classList.remove("wrong", "snap-back");
      void card.offsetWidth;
      card.classList.add("wrong");

      window.setTimeout(() => {
        card.classList.remove("wrong");
        eventBank.appendChild(card);
        card.classList.add("snap-back");
      }, 300);

      window.setTimeout(() => {
        card.classList.remove("snap-back");
      }, 620);
    }

    function showWin() {
      localStorage.setItem("cert_dynasty", "1");
      winText.textContent = `全部事件都配對完成，總嘗試次數：${attempts} 次。`;
      overlay.classList.add("show");
    }

    restartBtn.addEventListener("click", startGame);
    startGame();
  </script>
</body>
</html>
